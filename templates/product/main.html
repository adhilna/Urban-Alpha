<!doctype html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link href="{% static 'css/output.css' %}" rel="stylesheet">
    <title>{% block title %}Default Title{% endblock %}</title>
</head>
<body>

    <header>
        <nav style="background-color: #51942d; color: white;">
  <div class="container mx-auto flex items-center justify-between py-2">
    <!-- Logo -->
    <div class="flex items-center">
      <a href="#" class="text-2xl font-bold">Urban Alpha</a>
    </div>

    <!-- Search Bar -->
    <div class="flex-grow mx-4">
      <input
        type="text"
        placeholder="Search for products, brands and more"
        class="w-full px-4 py-2 rounded-md text-black focus:outline-none"
      />
    </div>

    <!-- User Actions -->
    <div class="flex items-center space-x-4">
      <a href="#" class="hover:underline">Login</a>
      <a href="#" class="hover:underline">Cart</a>
    </div>
  </div>
</nav>

          
    </header>
{% block content %}

{% endblock %}

<script src="{% static 'js/main.js' %}"></script>
</body>
</html>
